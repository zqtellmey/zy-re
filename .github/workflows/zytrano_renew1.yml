name: Zytrano Auto Renew

on:
#  schedule:
#    - cron: '0 2 */2 * *'  # 每两天 UTC 02:00 运行（北京时间 10:00）
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Chromium + Xvfb)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser xvfb

      - name: Install Python dependencies
        run: |
          pip install pydoll-python httpx

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup cp.zytrano.top/ 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: Run script
        env:
          ZYTRANO_USERNAME: ${{ secrets.ZYTRANO_USERNAME }}
          ZYTRANO_PASSWORD: ${{ secrets.ZYTRANO_PASSWORD }}
          WXPUSHER_TOKEN:   ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID:     ${{ secrets.WXPUSHER_UID }}
          DISPLAY: ":99"
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 +extension RANDR &
          sleep 1
          timeout 285 python zytrano_renew.py || echo "Exit code: $?"
          pkill Xvfb 2>/dev/null || true

      - name: Upload screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: ./screenshots/*.png
          retention-days: 3

      - name: Delete old workflow runs (keep latest 2)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'zytrano_renew.yml',
              per_page: 100,
            });
            const toDelete = workflow_runs.slice(2);
            for (const run of toDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
              console.log(`Deleted run #${run.run_number} (id=${run.id})`);
            }
